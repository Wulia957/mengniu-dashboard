<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>蒙牛&小象数据看板 v5</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:#1a1a2e; --card:#252540; --border:#3a3a5c; --text:#e4dff0; --muted:#9b97b0;
  --primary:#8b5cf6; --accent:#a78bfa; --lavender:#c4b5fd; --orange:#f59e0b; --green:#10b981; --red:#ef4444;
  --up:#22c55e; --down:#ef4444; --light-orange:rgba(251,191,36,0.5);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.loading{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999}
.loading .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.hdr{display:flex;align-items:center;padding:12px 24px;background:var(--card);border-bottom:1px solid var(--border);gap:16px}
.hdr .logo-left{height:32px}
.hdr .hdr-center{flex:1;text-align:center}
.hdr .hdr-center h1{font-size:20px;font-weight:700}
.meta-bar{padding:6px 24px;font-size:11px;color:var(--muted);text-align:center;background:#1e1e32;border-bottom:1px solid var(--border)}
.meta-bar span{color:var(--accent)}
.container{padding:16px 24px}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi-card.c-sales::before{background:var(--primary)}
.kpi-card.c-inv::before{background:var(--accent)}
.kpi-card.c-fulfill::before{background:var(--orange)}
.kpi-card.c-transit::before{background:var(--green)}
.kpi-card .kl{font-size:11px;color:var(--muted);margin-bottom:4px}
.kpi-card .kv{font-size:20px;font-weight:700}
.kpi-card .ks{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;font-size:11px}
.kpi-card .ks .si .sv{font-weight:600;font-size:12px}
.kpi-card .ks .si .sl{color:var(--muted);font-size:10px}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:1px 6px;border-radius:3px}
.badge-up{background:rgba(34,197,94,.15);color:var(--up)}
.badge-down{background:rgba(239,68,68,.15);color:var(--down)}
.badge-neutral{background:rgba(107,138,170,.15);color:var(--muted)}
.tab-nav{display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid var(--border)}
.tab-nav button{padding:8px 20px;font-size:13px;background:none;border:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;font-weight:500}
.tab-nav button.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-nav button:hover{color:var(--text)}
.tab-content{display:none}
.tab-content.active{display:block}
.sec{margin-bottom:20px}
.sec-title{font-size:15px;font-weight:700;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sec-title .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sec-title .dot.primary{background:var(--primary)}
.sec-title .dot.accent{background:var(--accent)}
.sec-title .dot.orange{background:var(--orange)}
.sec-title .dot.green{background:var(--green)}
.sec-title .dot.red{background:var(--red)}
.sec-title .sub{font-size:11px;color:var(--muted);font-weight:400}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.cc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px}
.cc .ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.cc .ch h3{font-size:13px;font-weight:600}
.cc .cw{position:relative}
.cc .cw canvas{width:100%!important}
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{background:#2a2a44;padding:8px 10px;text-align:left;color:var(--muted);font-weight:600;position:sticky;top:0;z-index:1;white-space:nowrap;cursor:pointer}
.data-table th:hover{color:var(--accent)}
.data-table td{padding:7px 10px;border-bottom:1px solid #2a2a44;white-space:nowrap}
.data-table tr:hover{background:rgba(139,92,246,.08)}
.data-table .td-red{background:rgba(239,68,68,.12);color:var(--red);font-weight:600}
.data-table tr.tr-oc-missing td{background:rgba(239,68,68,.08)}
.data-table .td-yellow{background:rgba(245,158,11,.12);color:var(--orange);font-weight:600}
.data-table .td-green{background:rgba(16,185,129,.12);color:var(--green)}
.data-table .td-blue{background:rgba(139,92,246,.10);color:var(--accent)}
.table-wrap{max-height:500px;overflow-y:auto;border:1px solid var(--border);border-radius:6px}
.table-wrap::-webkit-scrollbar{width:6px;height:6px}
.table-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.filter-bar{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.filter-bar .fl{display:flex;gap:6px;align-items:center}
.filter-bar .fr{display:flex;gap:6px;align-items:center}
.filter-bar .fc{display:flex;gap:6px;align-items:center}
.ms-wrap{position:relative;display:inline-block;vertical-align:middle}
.ms-btn{padding:3px 8px;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:3px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:4px;min-width:100px;white-space:nowrap;text-align:left}
.ms-btn:hover{border-color:var(--accent)}
.ms-btn .ms-arrow{font-size:9px;color:var(--muted);margin-left:auto}
.ms-drop{display:none;position:absolute;top:100%;left:0;z-index:50;background:var(--card);border:1px solid var(--border);border-radius:6px;min-width:180px;max-height:280px;overflow-y:auto;padding:4px 0;box-shadow:0 6px 20px rgba(0,0,0,0.5);margin-top:2px}
.ms-drop.show{display:block}
.ms-drop label{display:flex;align-items:center;gap:6px;padding:5px 12px;cursor:pointer;font-size:11px;color:var(--text);white-space:nowrap;transition:background .1s}
.ms-drop label:hover{background:rgba(139,92,246,0.1)}
.ms-drop label.all-row{border-bottom:1px solid var(--border);padding-bottom:7px;margin-bottom:2px;font-weight:600}
.ms-drop input[type=checkbox]{accent-color:var(--accent);width:13px;height:13px;cursor:pointer;flex-shrink:0}
.ms-drop .ms-note{padding:4px 12px;font-size:10px;color:var(--muted);font-style:italic}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:700px;width:90%;max-height:80vh;overflow-y:auto}
.modal h2{font-size:18px;margin-bottom:12px}
.modal .close-btn{float:right;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer}
.modal .kw{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.modal .kw .kv-item{text-align:center;padding:8px;background:#1e1e32;border-radius:6px}
.modal .kw .kv-item .vl{font-size:18px;font-weight:700}
.modal .kw .kv-item .lb{font-size:11px;color:var(--muted)}
.toggle-group{display:flex;gap:2px}
.toggle-btn{padding:3px 8px;font-size:11px;border:1px solid var(--border);background:transparent;color:var(--muted);border-radius:3px;cursor:pointer;transition:all .2s}
.toggle-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.toggle-btn:hover{border-color:var(--accent)}
.ft-input{padding:3px 8px;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:3px;font-size:11px;width:140px}

/* === v5: Heatmap === */
.hm-wrap{max-height:calc(100vh - 280px);overflow:auto;border:1px solid var(--border);border-radius:6px}
.hm-table{width:100%;border-collapse:collapse;font-size:9px}
.hm-table th{position:sticky;top:0;z-index:2;background:#1e1e32;padding:3px 2px;text-align:center;color:var(--muted);font-weight:600;white-space:nowrap;border-bottom:2px solid var(--border);font-size:8px;letter-spacing:-0.3px}
.hm-table th:first-child{position:sticky;left:0;z-index:3;text-align:left;min-width:100px;max-width:120px;font-size:9px}
.hm-table td{padding:2px 3px;text-align:center;border-bottom:1px solid #2a2a44;font-weight:600;cursor:default;transition:all .15s;font-size:9px}
.hm-table td:first-child{position:sticky;left:0;z-index:1;background:var(--card);text-align:left;font-size:9px;font-weight:500;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hm-table tr:hover td{filter:brightness(1.15)}
.hm-table .hm-oos{background:rgba(239,68,68,0.35);color:#fca5a5}
.hm-table .hm-low{background:rgba(245,158,11,0.25);color:#fcd34d}
.hm-table .hm-ok{background:rgba(16,185,129,0.18);color:#6ee7b7}
.hm-table .hm-excess{background:rgba(99,102,241,0.3);color:#c4b5fd;font-weight:700}
.hm-table .hm-empty{background:rgba(30,30,50,0.5);color:#4a4a6a}
.hm-tooltip{position:fixed;z-index:200;background:rgba(30,30,50,0.97);border:1px solid var(--accent);border-radius:6px;padding:8px 10px;font-size:11px;line-height:1.6;pointer-events:none;display:none;max-width:260px;box-shadow:0 4px 16px rgba(0,0,0,0.5)}
.hm-tooltip .tt-row{display:flex;justify-content:space-between;gap:16px}
.hm-tooltip .tt-lbl{color:var(--muted)}
.hm-tooltip .tt-val{font-weight:600}
.hm-legend{display:flex;gap:12px;align-items:center;margin-top:6px;font-size:10px;color:var(--muted);flex-wrap:wrap}
.hm-legend span{display:flex;align-items:center;gap:4px}
.hm-legend .hm-sq{width:12px;height:12px;border-radius:2px;flex-shrink:0}

/* === v5: Collapsible Cards === */
.cp-card{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden}
/* ★ v5.11: 双列网格 */
.fulfill-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fulfill-grid .cp-card{margin-bottom:0}
@media(max-width:900px){.fulfill-grid{grid-template-columns:1fr}}
.cp-card-header{display:flex;align-items:center;padding:10px 14px;cursor:pointer;gap:10px;transition:background .15s}
.cp-card-header:hover{background:rgba(139,92,246,0.06)}
.cp-card-header .cp-arrow{font-size:10px;color:var(--muted);transition:transform .2s;width:14px;text-align:center}
.cp-card.open .cp-arrow{transform:rotate(90deg)}
.cp-card-header .cp-title{font-weight:600;font-size:13px;flex:1}
.cp-card-header .cp-stats{display:flex;gap:12px;font-size:11px;flex-wrap:wrap}
.cp-card-header .cp-stats .cp-stat-item{display:flex;align-items:center;gap:3px}
.cp-card-body{display:none;padding:0 14px 14px;border-top:1px solid var(--border);overflow-x:auto}
.cp-card.open .cp-card-body{display:block}

/* === v5.1: Mini Data Table (replaces progress bars) === */
.cp-mini-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:4px}
.cp-mini-table th{background:#2a2a44;padding:5px 8px;text-align:left;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0}
.cp-mini-table th:not(:first-child){text-align:right}
.cp-mini-table td{padding:5px 8px;border-bottom:1px solid #2a2a44;white-space:nowrap}
.cp-mini-table td:not(:first-child){text-align:right}
.cp-mini-table td:first-child{font-weight:600;color:var(--text);cursor:pointer}
.cp-mini-table tr:hover{background:rgba(139,92,246,0.06)}
.cp-mini-table .td-urgent{background:rgba(239,68,68,0.15);color:var(--red);font-weight:600}
.cp-mini-table .td-warn{background:rgba(245,158,11,0.15);color:var(--orange);font-weight:600}
.cp-mini-table .td-ok{background:rgba(16,185,129,0.12);color:var(--green)}
.cp-mini-table .td-order{color:var(--up);font-weight:600}
/* Inline progress bar for inv_days */
.cp-bar-wrap{height:14px;background:#1e1e32;border-radius:3px;overflow:hidden;position:relative;min-width:80px}
.cp-bar-inner{height:100%;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:#fff;position:absolute;left:0;top:0;z-index:2}
.cp-bar-ghost{height:100%;border-radius:3px;opacity:0.25;position:absolute;left:0;top:0;z-index:1}
.cp-bar-wrap .cp-marker{position:absolute;left:0;top:0;width:1px;height:100%;background:#fff;z-index:3;opacity:0.5}

/* === v5.1: Card Tooltip (progress bar popover) === */
.card-tooltip{position:fixed;z-index:200;background:rgba(30,30,50,0.97);border:1px solid var(--accent);border-radius:6px;padding:10px 12px;font-size:11px;line-height:1.6;pointer-events:none;display:none;max-width:280px;box-shadow:0 4px 16px rgba(0,0,0,0.5)}
.card-tooltip .ct-row{display:flex;justify-content:space-between;gap:12px}
.card-tooltip .ct-lbl{color:var(--muted)}
.card-tooltip .ct-val{font-weight:600}
.card-tooltip .ct-bar-wrap{height:14px;background:#1e1e32;border-radius:3px;overflow:hidden;position:relative;margin:6px 0 4px}
.card-tooltip .ct-bar{height:100%;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff}
.card-tooltip .ct-marker{position:absolute;top:0;bottom:0;width:2px;background:#fff;opacity:0.5;z-index:1}
.card-tooltip .ct-legend{display:flex;gap:12px;margin-top:4px;font-size:10px;color:var(--muted)}


/* === v5: Today Order Summary === */
.today-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.today-sum-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 16px;text-align:center;cursor:default;position:relative}
.today-sum-card:hover{background:#2a2a48}
.today-sum-card .tsv{font-size:24px;font-weight:700}
.today-sum-card .tsl{font-size:11px;color:var(--muted);margin-top:4px}
/* === v5.11: Today Summary Compact (merged layout) === */
.today-summary-compact{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.today-summary-compact .tsc-item{flex:1;min-width:130px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:background .15s}
.today-summary-compact .tsc-item:hover{background:#2a2a48}
.today-summary-compact .tsc-val{font-size:20px;font-weight:700;line-height:1.2}
.today-summary-compact .tsc-unit{font-size:10px;font-weight:400;color:var(--muted)}
.today-summary-compact .tsc-sub{font-size:10px;color:var(--accent);margin-top:1px}
.today-summary-compact .tsc-lbl{font-size:10px;color:var(--muted);margin-bottom:2px}
/* hover tooltip for summary cards */
.today-tt{position:fixed;z-index:200;background:rgba(30,30,50,0.97);border:1px solid var(--accent);border-radius:6px;padding:10px 12px;font-size:11px;line-height:1.6;pointer-events:none;display:none;max-width:320px;box-shadow:0 4px 16px rgba(0,0,0,0.5)}
.today-tt .tt-row{display:flex;justify-content:space-between;gap:16px;padding:2px 0}
.today-tt .tt-lbl{color:var(--muted)}
.today-tt .tt-val{font-weight:600}

/* ★ v5.12: 昨日验收 tooltip */
.yr-tt{position:fixed;z-index:200;background:rgba(30,30,50,0.97);border:1px solid var(--accent);border-radius:6px;padding:8px 10px;font-size:11px;line-height:1.7;pointer-events:none;display:none;max-width:320px;box-shadow:0 4px 16px rgba(0,0,0,0.5)}
.yr-tt .yr-city{color:var(--accent);font-weight:600;font-size:11px;margin-top:2px}
.yr-tt .yr-row{display:flex;justify-content:space-between;gap:12px;padding:1px 0 1px 8px}
.yr-tt .yr-lbl{color:var(--muted)}
.yr-tt .yr-val{font-weight:600}
.yr-tt .yr-gap{color:var(--orange);font-weight:700}

/* ★ v5.16: 履约品项 tooltip (采购单号) */
.fulfill-tt{position:fixed;z-index:200;background:rgba(30,30,50,0.97);border:1px solid var(--accent);border-radius:6px;padding:8px 10px;font-size:11px;line-height:1.7;pointer-events:none;display:none;max-width:340px;box-shadow:0 4px 16px rgba(0,0,0,0.5)}
.fulfill-tt.pinned{pointer-events:auto;display:block!important;border-color:var(--orange)}
.fulfill-tt .ft-row{display:flex;justify-content:space-between;gap:12px;padding:1px 0}
.fulfill-tt .ft-ono{color:var(--accent);font-weight:600}
.fulfill-tt .ft-pcs{font-weight:600}

/* ★ v5.16: 全局 tooltip pinned 状态 */
.pinned{pointer-events:auto!important;display:block!important;border-color:var(--orange)!important}

/* === v5: Order-Stock Link Badge === */
.link-stock{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:600}
.link-oos{background:rgba(239,68,68,.15);color:var(--red)}
.link-low{background:rgba(245,158,11,.15);color:var(--orange)}
.link-ok{background:rgba(16,185,129,.12);color:var(--green)}
.link-none{background:rgba(107,138,170,.10);color:var(--muted)}
.tt-row-hover{font-size:10px;margin-top:1px;display:flex;justify-content:space-between;cursor:pointer;padding:1px 4px;border-radius:3px}
.tt-row-hover:hover{background:rgba(139,92,246,0.12)}
.tt-vals{font-weight:600;color:var(--accent);white-space:nowrap}
.tt-lbl{color:var(--muted);white-space:nowrap}

.receipt-table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.receipt-table col.sku{width:10%} .receipt-table col.prod{width:22%}
.receipt-table th{background:rgba(139,92,246,.06);color:var(--muted);font-weight:500;padding:5px 8px;text-align:right;font-size:11px;border-bottom:1px solid var(--border)}
.receipt-table th.al{text-align:left}
.receipt-table td{padding:4px 8px;text-align:right;border-bottom:1px solid var(--border);color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.receipt-table td.al{text-align:left}
.receipt-table td.prod{font-weight:500}
.receipt-table .sum-row td{background:rgba(139,92,246,.12);color:var(--accent);font-weight:700;font-size:12px;border-bottom:2px solid rgba(139,92,246,.25)}
.receipt-table .td-gap{color:var(--orange);font-weight:700}
.receipt-table .td-ok{color:var(--green)}
.receipt-table .td-rate{color:var(--accent);font-weight:600}
.receipt-table .td-cum{color:var(--lavender);font-weight:600}
.gap-tip{cursor:pointer;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px}
.receipt-wrap{overflow-x:auto;max-height:400px;overflow-y:auto}
@media(max-width:1200px){.grid2{grid-template-columns:1fr}.today-summary{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){.today-summary{grid-template-columns:1fr}.hdr{flex-direction:column}}
</style>
</head>
<body>

<div class="loading" id="loader"><div class="spinner"></div></div>

<!-- Header -->
<div class="hdr">
  <img class="logo-left" src="../素材资源/蒙牛logo.png" alt="蒙牛" onerror="this.style.display='none'">
  <img class="logo-left" src="../素材资源/小象超市logo.png" alt="小象超市" onerror="this.style.display='none'>
  <div class="hdr-center"><h1>蒙牛&times;小象超市 &middot; 销售&库存数据看板 v5</h1></div>
</div>
<div class="meta-bar" id="metaInfo">加载中...</div>

<div class="container">

<!-- KPI Row -->
<div class="kpi-row" id="kpiRow"></div>

<!-- Tab Navigation -->
<div class="tab-nav">
  <button class="active" onclick="switchTab('sales')">📈 销售分析</button>
  <button onclick="switchTab('tracking')">📦 库存分析</button>
  <button onclick="switchTab('fulfill')">🚚 履约板块</button>
</div>

<!-- ============ Tab1: Sales Analysis (unchanged) ============ -->
<div class="tab-content active" id="tab-sales">
  <div class="sec"><div class="sec-title"><span class="dot primary"></span>销售趋势</div>
    <div class="cc">
      <div class="ch"><h3>每日销售额 & 销量双轴图</h3>

<script>
// ==== Globals ====
var data, allCharts={};
var COLORS=['#8b5cf6','#a78bfa','#c4b5fd','#e879f9','#f59e0b','#10b981','#ef4444','#22c55e','#f97316','#ec4899','#6366f1','#06b6d4','#14b8a6','#d946ef','#eab308','#84cc16'];
var prodRankMode='revenue';

Chart.defaults.color='#9b97b0';
Chart.defaults.borderColor='#3a3a5c';
Chart.defaults.font.family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif";
Chart.defaults.plugins.tooltip.backgroundColor='rgba(37,37,64,0.95)';
Chart.defaults.plugins.tooltip.borderColor='#3a3a5c';

function fmt(n){if(n==null)return'0';if(Math.abs(n)>=1e8)return(n/1e8).toFixed(2)+'亿';if(Math.abs(n)>=1e4)return(n/1e4).toFixed(2)+'万';return Number(n).toLocaleString('zh-CN',{maximumFractionDigits:0})}
function fmtR(n){if(n==null)return'¥0';if(Math.abs(n)>=1e8)return'¥'+(n/1e8).toFixed(2)+'亿';if(Math.abs(n)>=1e4)return'¥'+(n/1e4).toFixed(1)+'万';return'¥'+Number(n).toLocaleString('zh-CN',{maximumFractionDigits:0})}
function fmtW(n){if(n==null)return'0万';var v=parseFloat(n);return v.toFixed(2)+'万'}
function dodBadge(v){if(v==null||v===0)return'<span class="badge badge-neutral">&rarr;持平</span>';var a=v>0?'&#9650;':'&#9660;';var c=v>0?'badge-up':'badge-down';return'<span class="badge '+c+'">'+a+' '+(Math.abs(v)*100).toFixed(1)+'%</span>'}

// ============================================================
//  Multi-Select Widget
// ============================================================
var MS={};
function initMS(id, placeholder, options, onChange){
  MS[id] = {placeholder:placeholder, options:options, selected:new Set(options), all:true, onChange:onChange};
  buildMSDrop(id);
  updateMSBtn(id);
}
function buildMSDrop(id){
  var st=MS[id]; if(!st)return;
  var drop=document.getElementById(id+'_drop'); if(!drop)return;
  var html='<label class="all-row"><input type="checkbox" id="'+id+'_all" checked onchange="msToggleAll(\''+id+'\',this.checked)"><span>'+st.placeholder+'</span></label>';
  st.options.forEach(function(opt){
    var label=opt.length>28?opt.slice(0,28)+'..':opt;
    html+='<label><input type="checkbox" checked onchange="msCheckChange(\''+id+'\',\''+opt.replace(/'/g,"\\'")+'\',this.checked)"><span>'+label+'</span></label>';
  });
  if(st.options.length>12)html+='<div class="ms-note">'+st.options.length+'项可选</div>';
  drop.innerHTML=html;
}
function toggleMS(id){
  var drop=document.getElementById(id+'_drop'); if(!drop)return;
  var isOpen=drop.classList.contains('show');
  document.querySelectorAll('.ms-drop.show').forEach(function(d){d.classList.remove('show')});
  if(!isOpen)drop.classList.add('show');
}
function msCheckChange(id, value, checked){
  var st=MS[id]; if(!st)return;
  if(checked)st.selected.add(value); else st.selected.delete(value);
  st.all = st.selected.size === st.options.length;
  document.getElementById(id+'_all').checked = st.all;
  updateMSBtn(id);
  if(st.onChange)st.onChange();
}
function msToggleAll(id, checked){
  var st=MS[id]; if(!st)return;
  if(checked){st.selected=new Set(st.options); st.all=true;}
  else{st.selected=new Set(); st.all=false;}
  var drop=document.getElementById(id+'_drop');
  if(drop){
    var cbs=drop.querySelectorAll('input[type=checkbox]:not(.all-row input)');
    cbs.forEach(function(cb){cb.checked=checked;});
  }
  updateMSBtn(id);
  if(st.onChange)st.onChange();
}
function updateMSBtn(id){
  var st=MS[id]; if(!st)return;
  var btn=document.getElementById(id).querySelector('.ms-label');
  if(!btn)return;
  if(st.all){btn.textContent=st.placeholder;}
  else{btn.textContent=st.selected.size+'项已选';}
}
function getMSVal(id){
  var st=MS[id]; if(!st || st.all)return'all';
  return Array.from(st.selected);
}
document.addEventListener('click',function(e){
  var inside=false; var el=e.target;
  while(el){if(el.classList&&el.classList.contains('ms-wrap')){inside=true;break;}el=el.parentElement;}
  if(!inside)document.querySelectorAll('.ms-drop.show').forEach(function(d){d.classList.remove('show')});
});

// ============================================================
//  Filter helpers
// ============================================================
function filterByCities(rows, cv){
  if(cv==='all')return rows;
  return rows.filter(function(r){return cv.some(function(c){return r.cities&&r.cities.indexOf(c)>=0});});
}
function filterByCityField(rows, cv, field){
  if(cv==='all')return rows;
  return rows.filter(function(r){return cv.indexOf(r[field])>=0;});
}
function filterByProd(rows, cv, field){
  if(cv==='all')return rows;
  field=field||'product';
  return rows.filter(function(r){return cv.indexOf(r[field])>=0;});
}

// ============================================================
//  Tab switching
// ============================================================
function switchTab(tab){
  document.querySelectorAll('.tab-nav button').forEach(function(b){b.classList.remove('active')});
  document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active')});
  document.getElementById('tab-'+tab).classList.add('active');
  event.target.classList.add('active');
  setTimeout(function(){
    Object.values(allCharts).forEach(function(c){if(c&&c.resize)c.resize()});
    document.querySelectorAll('.ms-drop.show').forEach(function(d){d.classList.remove('show')});
  },100);
}

// ============================================================
//  Chart Helpers
// ============================================================

function renderTrend(){
  var dt=data.daily_trend;
  var cvRegion=getMSVal('ms_trend_region');
  var cv=getMSVal('ms_trend_city');
  // Region aggregate
  if(cvRegion!=='all' && !(cv!=='all' && cv.length===1)){
    var regionCities=Object.keys(data.city_trend||{}).filter(function(c){
      return cvRegion.indexOf((data.region_map||{})[c]||'')>=0;
    });
    if(regionCities.length>0){
      var dateMap={};
      regionCities.forEach(function(c){
        (data.city_trend[c]||[]).forEach(function(d){
          if(!dateMap[d.date])dateMap[d.date]={date:d.date,revenue:0};
          dateMap[d.date].revenue+=(d.revenue||0);
        });
      });
      dt=Object.keys(dateMap).sort().map(function(dk){
        var gd=data.daily_trend.find(function(g){return g.date===dk})||{};
        return {date:dk,revenue:dateMap[dk].revenue,volume:gd.volume||0,dod:gd.dod||0,stock:gd.stock||0,inv_days:gd.inv_days||0,is_weekend:gd.is_weekend||false};
      });
    }
  }
  // Single city
  else if(cv!=='all' && data.city_trend && cv.length===1 && data.city_trend[cv[0]]){
    var ct=data.city_trend[cv[0]];
    dt=ct.map(function(d){
      var gd=data.daily_trend.find(function(g){return g.date===d.date})||{};
      return {date:d.date,revenue:d.revenue,volume:gd.volume||0,dod:gd.dod||0,stock:gd.stock||0,inv_days:gd.inv_days||0,is_weekend:gd.is_weekend||false};
    });
  }
  var lbls=dt.map(function(d){return d.date.slice(5)});
  var revData=dt.map(function(d){return d.revenue});
  var volData=dt.map(function(d){return d.volume});

  var ptColors=dt.map(function(d){return d.is_weekend?'rgba(251,191,36,0.6)':'#8b5cf6'});
  destroyChart('trend');
  allCharts.trend=new Chart(document.getElementById('cTrend'),{
    type:'bar',data:{labels:lbls,datasets:[
      {label:'销售额(万元)',data:revData.map(function(v){return Math.round(v/10000)}),backgroundColor:bgColors,borderColor:ptColors,borderWidth:2,borderRadius:2,yAxisID:'y',order:2},
      {label:'销量(万件)',data:volData.map(function(v){return parseFloat((v/10000).toFixed(1))}),borderColor:COLORS[4],backgroundColor:'transparent',borderWidth:2,tension:.3,pointRadius:3,pointHoverRadius:5,type:'line',yAxisID:'y1',order:1}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{position:'top',labels:{usePointStyle:true,padding:16,boxWidth:8,font:{size:11}}},
        tooltip:{callbacks:{label:function(c){if(c.dataset.label.indexOf('万元')>=0)return '销售额: '+c.raw+'万元';return '销量: '+c.raw+'万件'}}}},
      scales:{x:{grid:{display:false},ticks:{maxRotation:45,font:{size:10}}},
        y:{position:'left',grid:{color:'rgba(58,58,92,0.4)'},ticks:{font:{size:10},callback:function(v){return v+'万'}},title:{display:true,text:'销售额(万元)',font:{size:10}}},
        y1:{position:'right',grid:{display:false},ticks:{font:{size:10},callback:function(v){return v+'万'}},title:{display:true,text:'销量(万件)',font:{size:10}}}}

function renderProdRank(){

    if(cvRegion!=='all'){
      allCities.forEach(function(c){if(cvRegion.indexOf((data.region_map||{})[c]||'')>=0)effCities.push(c);});
    }else{effCities=allCities.slice();}
    if(cv!=='all'){effCities=effCities.filter(function(c){return cv.indexOf(c)>=0;});}
  }

    var cpMap={};

      return {product:p, revenue:cpMap[p].revenue, volume:cpMap[p].volume, cities:orig.cities||[]};
    }).filter(function(p){return p.revenue>0;}).sort(function(a,b){return b.revenue-a.revenue;});

          tooltip:{callbacks:{
            title:function(its){return its[0].label;},
            afterBody:function(its){
              var lines=[]; var sum=0;
              its.forEach(function(it){sum+=it.raw;lines.push('  '+it.dataset.label+': ¥'+it.raw+'万');});

function renderDonut(){
  var cvRegion=getMSVal('ms_donut_region');
  var s=[];
  if(cvRegion!=='all'){
    // Get cities in selected region(s)
    var regionCities=[];
    (data.city_product_detail||[]).forEach(function(r){
      var rg=(data.region_map||{})[r.city]||'';
      if(cvRegion.indexOf(rg)>=0 && regionCities.indexOf(r.city)<0)regionCities.push(r.city);
    });
    // Recompute brand share from filtered city_product_detail
    var productToBrand={};
    (data.product_share||[]).forEach(function(br){
      (br.products||[]).forEach(function(p){productToBrand[p.name]=br.brand;});
    });
    var brandRev={};
    (data.city_product_detail||[]).forEach(function(r){
      if(regionCities.indexOf(r.city)<0)return;
      var br=productToBrand[r.product]||'其他';
      brandRev[br]=(brandRev[br]||0)+(r.revenue||0);
    });
    s=Object.keys(brandRev).map(function(b){return {brand:b, revenue:brandRev[b]};});
    s.sort(function(a,b){return b.revenue-a.revenue;});
    var total=s.reduce(function(a,b){return a+b.revenue;},0);
    s.forEach(function(br){br.pct=total>0?Math.round(br.revenue/total*100):0;});
  } else {
    s=data.product_share||[];
  }
  if(s.length===0){document.getElementById('cDonut').style.display='none';destroyChart('donut');return;}
  document.getElementById('cDonut').style.display='';
  var total=s.reduce(function(a,b){return a+b.revenue;},0);
  var ls=s.map(function(d){return d.brand});
  var vs=s.map(function(d){return Math.round(d.revenue/10000)});
  var BRAND_COLORS=['#8b5cf6','#f59e0b','#10b981','#ef4444','#6366f1'];
  destroyChart('donut');
  allCharts.donut=new Chart(document.getElementById('cDonut'),{
    type:'doughnut',data:{labels:ls,datasets:[{data:vs,backgroundColor:BRAND_COLORS.map(function(c){return c+'cc'}),borderColor:'#1a1a2e',borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'right',labels:{padding:10,font:{size:10},usePointStyle:true,boxWidth:6}},
        tooltip:{callbacks:{label:function(c){var idx=c.dataIndex;var pct=s[idx]?(s[idx].pct||0):0;var products=s[idx]?(s[idx].products||[]):[];var lines=[c.label+': ¥'+c.raw+'万 ('+pct+'%)'];if(products.length>0){lines.push('━━━━━━━━━━');products.forEach(function(p){lines.push('  '+p.name+' ¥'+p.revenue.toLocaleString());});}return lines;}}}},
    },
    plugins:[{id:'donutValues',afterDatasetsDraw:function(chart){
      var ctx=chart.ctx;ctx.save();ctx.font='bold 11px -apple-system,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      var meta=chart.getDatasetMeta(0);var sum=vs.reduce(function(a,b){return a+b},0);
      meta.data.forEach(function(arc,i){var angle=(arc.startAngle+arc.endAngle)/2;var r=arc.outerRadius*0.62;var x=arc.x+Math.cos(angle)*r, y=arc.y+Math.sin(angle)*r;var pct=(vs[i]/sum*100).toFixed(0);ctx.fillStyle='#1a1a2e';ctx.fillText('¥'+vs[i]+'万',x,y-7);ctx.fillStyle='#e4dff0';ctx.font='bold 10px -apple-system,sans-serif';ctx.fillText(pct+'%',x,y+7);ctx.font='bold 11px -apple-system,sans-serif';});

var tableSortState={};
function sortTable(tableId,colIdx,parser){
  if(!parser)parser=function(v){return parseFloat(v)||0};
  var key=tableId+'_'+colIdx;
  var dir=tableSortState[key]==='asc'?'desc':'asc'; tableSortState[key]=dir;
  var tbl=document.getElementById(tableId); if(!tbl)return;
  var rows=tbl.querySelectorAll('tbody tr');
  var arr=Array.prototype.slice.call(rows);
  arr.sort(function(a,b){var va=parser(a.cells[colIdx].textContent);var vb=parser(b.cells[colIdx].textContent);return dir==='asc'?va-vb:vb-va;});
  var tbody=tbl.querySelector('tbody'); arr.forEach(function(r){tbody.appendChild(r)});
  if(tbl.querySelectorAll) tbl.querySelectorAll('th .sort-arrow').forEach(function(s){s.textContent=''});
  var th=tbl.querySelectorAll('th')[colIdx];
  if(th){var sp=th.querySelector('.sort-arrow');if(sp)sp.textContent=dir==='asc'?' ▲':' ▼';}
}

function renderOrderCalendar(){
  var oc=data.order_calendar||[];
  var n7=data.next7_dates||[];
  var cvRegion=getMSVal('ms_oc_region');
  if(cvRegion!=='all')oc=oc.filter(function(r){return cvRegion.indexOf((data.region_map||{})[r.city]||'')>=0;});
  var cvCity=getMSVal('ms_oc_city'); var cvProd=getMSVal('ms_oc_prod'); var cvMiss=getMSVal('ms_oc_miss'); var cvStatus=getMSVal('ms_oc_status');
  oc=filterByCityField(oc, cvCity, 'city');
  if(cvProd!=='all') oc=oc.filter(function(r){return cvProd.indexOf(r.product)>=0;});
  if(cvMiss!=='all'){
    oc=oc.filter(function(r){
      var isMiss=r.is_order_day && r.today_order_boxes===0;
      var isOrdered=r.is_order_day && r.today_order_boxes>0;
      if(cvMiss.indexOf('遗漏')>=0 && isMiss) return true;
      if(cvMiss.indexOf('已下单')>=0 && isOrdered) return true;
      if(cvMiss.indexOf('非订货日')>=0 && !r.is_order_day) return true;
      return false;
    });
  }
  if(cvStatus!=='all'){
    oc=oc.filter(function(r){return cvStatus.indexOf(r.is_sufficient||'')>=0;});
  }
  oc.sort(function(a,b){return (b.today_order_value||0)-(a.today_order_value||0);});
  
  var html='<table class="data-table" style="font-size:11px"><thead><tr>';
  html+='<th>城市</th><th>skuid</th><th>商品</th><th>状态</th><th style="text-align:center">今日订货日</th><th style="text-align:center">今日下单</th><th style="text-align:center;color:var(--green)">今日金额</th><th style="text-align:center">昨销</th><th style="text-align:center">前置/大仓</th>';
  n7.forEach(function(d){html+='<th style="text-align:center">'+d.slice(5)+'</th>';});
  html+='</tr></thead><tbody>';
  
  oc.forEach(function(r){
    var trCls = r.oc_missing ? ' class="tr-oc-missing"' : '';
    html+='<tr'+trCls+'>';
    html+='<td>'+r.city+'</td>';
    html+='<td>'+(r.sku_id||'').toString().replace(/\.0$/,'')+'</td>';
    html+='<td>'+r.product+'</td>';
    var st=r.is_sufficient||'';
    var stClr=st==='断货'?'var(--red)':st==='紧缺'?'var(--orange)':'var(--green)';
    html+='<td style="color:'+stClr+';font-weight:600">'+st+'</td>';
    var todayVal=r.today_order_value||0;
    var todayValStr=todayVal>0?todayVal.toFixed(2)+'万':'—';
    if(r.is_order_day){
      html+='<td style="text-align:center;color:var(--red);font-weight:600">🔴订货日</td>';
      if(r.today_order_boxes>0){
        html+='<td style="text-align:center;color:var(--green);font-weight:600">'+Number(r.today_order_boxes).toLocaleString('zh-CN',{maximumFractionDigits:0})+'</td>';
      } else {
        html+='<td style="text-align:center;color:var(--red);font-weight:600">⚡遗漏</td>';
      }
    } else {

// === 2-A: Heatmap ===
function renderHeatmap(){
  var cpd=data.city_product_detail||[];
  var cvRegion=getMSVal('ms_hm_region'); var cvCity=getMSVal('ms_hm_city'); var cvProd=getMSVal('ms_hm_prod');
  var rows=cpd;
  if(cvRegion!=='all') rows=rows.filter(function(r){return cvRegion.indexOf((data.region_map||{})[r.city]||'')>=0;});
  if(cvCity!=='all') rows=rows.filter(function(r){return cvCity.indexOf(r.city)>=0;});
  if(cvProd!=='all') rows=rows.filter(function(r){return cvProd.indexOf(r.product)>=0;});
  // ★ v5.9: 过滤昨销=0且7日销=0的SKU
  rows=rows.filter(function(r){return (r.yesterday_volume||0)>0||(r.daily_avg_7d||0)>0;});

  // Build matrix
  var products=[], prodSet={}, cities=[], citySet={};
  rows.forEach(function(r){
    if(!prodSet[r.product]){prodSet[r.product]=true;products.push(r.product);}
    if(!citySet[r.city]){citySet[r.city]=true;cities.push(r.city);}
  });
  cities.sort();
  // ★ v5.6: 区域分组排序，表头增加区域行
  var REGION_ORDER = ['华北','华南','华中','华东','川渝陕'];
  var regionMap = data.region_map || {};
  var regionGroups = {};
  cities.forEach(function(c){
    var rg = regionMap[c] || '其他';
    if(!regionGroups[rg]) regionGroups[rg] = [];
    regionGroups[rg].push(c);
  });
  // 区域内按销售额降序
  var cityRev={};
  (data.city_product_detail||[]).forEach(function(r){cityRev[r.city]=(cityRev[r.city]||0)+(r.revenue||0);});
  Object.keys(regionGroups).forEach(function(rg){
    regionGroups[rg].sort(function(a,b){return (cityRev[b]||0)-(cityRev[a]||0);});
  });
  // 按指定顺序排列城市
  var orderedCities = [];
  REGION_ORDER.forEach(function(rg){
    if(regionGroups[rg]) orderedCities = orderedCities.concat(regionGroups[rg]);
  });
  Object.keys(regionGroups).forEach(function(rg){
    if(REGION_ORDER.indexOf(rg)<0) orderedCities = orderedCities.concat(regionGroups[rg]);
  });
  cities = orderedCities;
  // 计算每个区域的城市数 (用于表头colspan)
  var regionColspans = {};
  REGION_ORDER.forEach(function(rg){if(regionGroups[rg]) regionColspans[rg]=regionGroups[rg].length;});
  Object.keys(regionGroups).forEach(function(rg){if(!regionColspans[rg]) regionColspans[rg]=regionGroups[rg].length;});
  // ★ v5.1: remove zero-revenue products, sort by revenue desc
  var prodRev={};
  (data.city_product_detail||[]).forEach(function(r){
    prodRev[r.product]=(prodRev[r.product]||0)+(r.revenue||0);
  });
  products=products.filter(function(p){return (prodRev[p]||0)>0;});
  products.sort(function(a,b){return (prodRev[b]||0)-(prodRev[a]||0);});

  // Build lookup
  var lookup={};
  rows.forEach(function(r){lookup[r.city+'||'+r.product]=r;});

  var html='<table class="hm-table"><thead>';
  // ★ v5.6: 区域分组表头行
  html+='<tr style="background:#2a2a44">';
  html+='<th style="position:sticky;top:0;left:0;z-index:4;background:#1e1e32"></th>';
  var lastRg='';
  orderedCities.forEach(function(c){
    var rg=regionMap[c]||'其他';
    if(rg!==lastRg){
      if(regionColspans[rg]) html+='<th colspan="'+regionColspans[rg]+'" style="background:#2a2a44;font-weight:700;color:var(--accent);font-size:10px">'+rg+'</th>';
      lastRg=rg;
    }
  });
  html+='</tr>';
  // 城市列名行
  html+='<tr><th>商品 ↓ / 城市 →</th>';
  orderedCities.forEach(function(c){html+='<th>'+c+'</th>';});
  html+='</tr></thead><tbody>';

  products.forEach(function(p){
    html+='<tr><td title="'+p+'">'+p+'</td>';
    cities.forEach(function(c){
      var r=lookup[c+'||'+p];
      if(!r){html+='<td class="hm-empty">—</td>';return;}
      var status=r.is_sufficient||'足量';
      var cls='hm-ok';
      if(status==='断货')cls='hm-oos';
      else if(status==='紧缺')cls='hm-low';
      else if(status==='积压')cls='hm-excess';
      var tip='data-city="'+c.replace(/"/g,'&quot;')+'" data-prod="'+p.replace(/"/g,'&quot;')+'"';
      html+='<td class="'+cls+'" '+tip+' data-hm="1" onmouseenter="hmShow(event,this)" onmouseleave="hmHide()" ondblclick="pinHmTooltip(event,this)">'+r.inv_days+'天</td>';
    });
    html+='</tr>';
  });
  html+='</tbody></table>';
  document.getElementById('heatmapWrap').innerHTML=html;
}

function initAllMS(){

  alertProds.sort(function(a,b){return (prodRev[b]||0)-(prodRev[a]||0);});

  for(var k in cityOn){
    var isRegion=k.indexOf('region')>=0;
    initMS(k, isRegion?'全部区域':'全部城市', isRegion?regions:cities, cityOn[k]);
  }

  // Tab2: Heatmap
  initMS('ms_hm_region', '全部区域', regions, renderHeatmap);
  initMS('ms_hm_city', '全部城市', cpCitiesSorted, renderHeatmap);
  initMS('ms_hm_prod', '全部商品', cpProdsSorted, renderHeatmap);

  // Tab2-C: Order Calendar
  initMS('ms_oc_region', '全部区域', regions, renderOrderCalendar);
  initMS('ms_oc_city', '全部城市', cpCitiesSorted, renderOrderCalendar);
  initMS('ms_oc_prod', '全部商品', cpProdsSorted, renderOrderCalendar);
  initMS('ms_oc_miss', '全部订货状态', ['遗漏','已下单','非订货日'], renderOrderCalendar);
  initMS('ms_oc_status', '全部库存状态', ['断货','紧缺','足量','积压'], renderOrderCalendar);
}

function loadData(){
  try {
    data = DASHBOARD_DATA;
    document.getElementById('loader').style.display='none';
    document.getElementById('metaInfo').innerHTML='更新: '+data.meta.generated_at+' &emsp; 范围: '+data.meta.date_range+' &emsp; '+data.meta.num_days+'天 &emsp; 总销售: <span>'+fmtR(data.kpi.mtd_revenue)+'</span>';
    initAllMS();
    renderAll();
  } catch(e) {
    document.getElementById('loader').style.display='none';
    alert('数据加载失败: '+e.message+'\n请运行 更新看板数据.bat 生成数据文件');
  }
}

function renderAll(){
  renderKPI();
  // Tab1
  renderTrend(); populateProdFilter(); renderProdRank(); renderDonut(); renderCityRank(); renderProdTrend();
  // Tab2: 库存分析 (v5.9 合并)
  renderHeatmap(); renderOrderCalendar();
  // Tab3: 履约板块 (v5.11 NEW)
  renderYesterdayReceipt();
  renderFulfillment();
}

// ============================================================
//  Tab3: 昨日收货验收 — 按单品聚合 (v5.12 NEW)
// ============================================================
var yrData=[];
function renderYesterdayReceipt(){
  yrData=data.kpi.yesterday_receipt||[];
  document.getElementById('yrDate').textContent=data.kpi.yesterday_receipt_date||'';
  if(!yrData.length){
    document.getElementById('yrTable').innerHTML='<div style="color:var(--muted);text-align:center;padding:20px;font-size:13px">暂无昨日到货数据</div>';
    return;
  }
  var totOP=0,totRP=0,totGap=0;
  yrData.forEach(function(r){totOP+=r.ordered_pcs;totRP+=r.received_pcs;totGap+=r.gap_pcs;});
  var totRate=totOP>0?(totRP/totOP*100).toFixed(1)+'%':'—';

  // colgroup: SKUID 10% | 品名 22% | 采购pcs/实收pcs/缺交/满足率/累计满足率 均分余下68%
  var html='<table class="receipt-table"><colgroup><col class="sku"><col class="prod"><col><col><col><col><col></colgroup><thead>';
  // ★ 合计行置顶, 紫色高亮
  html+='<tr class="sum-row"><td class="al" colspan="2">合计 ('+yrData.length+'品)</td><td>'+totOP.toLocaleString()+'</td><td>'+totRP.toLocaleString()+'</td><td class="'+(totGap>0?'td-gap':'td-ok')+'">'+(totGap>0?totGap.toLocaleString():'-')+'</td><td class="td-rate">'+totRate+'</td><td class="td-cum">'+totRate+'</td></tr>';
  // 列头
  html+='<tr><th class="al">SKUID</th><th class="al">品名</th><th>采购pcs</th><th>实收pcs</th><th>缺交</th><th>采购满足率</th><th>累计满足率</th></tr></thead><tbody>';

  // 按采购pcs降序, 计算累计满足率
  var cumO=0, cumR=0;
  yrData.forEach(function(r,i){
    cumO+=r.ordered_pcs; cumR+=r.received_pcs;
    var gap=r.gap_pcs;
    var gapCls=gap>0?'td-gap gap-tip':'td-ok';
    var evt=gap>0?' onmouseenter="yrShow(event,'+i+')" onmouseleave="yrHide()" data-yr="'+i+'" ondblclick="pinYrTooltip(event,'+i+')"':'';
    var rate=r.ordered_pcs>0?(r.received_pcs/r.ordered_pcs*100).toFixed(1)+'%':'—';
    var cumRate=cumO>0?(cumR/cumO*100).toFixed(1)+'%':'—';
    var rateCls=gap>0?'gap-tip td-gap':'td-rate';
    html+='<tr><td class="al" style="color:var(--muted);font-size:10px">'+(r.sku_id||'—')+'</td><td class="al prod">'+r.product+'</td><td>'+r.ordered_pcs.toLocaleString()+'</td><td>'+r.received_pcs.toLocaleString()+'</td><td class="'+gapCls+'"'+evt+'>'+(gap>0?gap.toLocaleString():'-')+'</td><td class="'+rateCls+'"'+evt+'>'+rate+'</td><td class="td-cum">'+cumRate+'</td></tr>';
  });
  html+='</tbody></table>';
  document.getElementById('yrTable').innerHTML=html;
}

function yrShow(e, idx){
  var tt=document.getElementById('yrTooltip');
  if(tt.classList.contains('pinned'))return;
  var r=yrData[idx]; if(!r||!r.shortage_cities)return;
  var sc=r.shortage_cities.filter(function(s){return s.gap_pcs>0;});
  if(!sc.length)return;
  var html='<div style="font-weight:600;margin-bottom:4px;color:var(--accent)">'+r.product+' 缺交明细</div>';
  sc.forEach(function(s){
    html+='<div class="yr-city">'+s.city+'</div>';
    html+='<div class="yr-row"><span class="yr-lbl">采购 / 实收</span><span class="yr-val">'+s.ordered_pcs+'pcs / '+s.received_pcs+'pcs &nbsp;<span class="yr-gap">缺'+s.gap_pcs+'pcs</span></span></div>';
    if(s.order_nos&&s.order_nos.length){
      html+='<div class="yr-row"><span class="yr-lbl">单号</span><span class="yr-val" style="font-size:10px">'+s.order_nos.join(', ')+'</span></div>';
    }
  });
  tt.innerHTML=html; tt.style.display='block';
  positionTt(e,tt);
}
function yrHide(){var tt=document.getElementById('yrTooltip');if(!tt.classList.contains('pinned'))tt.style.display='none';}
function pinYrTooltip(e,idx){e.stopPropagation();yrShow(e,idx);var tt=document.getElementById('yrTooltip');if(tt.classList.contains('pinned')){tt.classList.remove('pinned');tt.style.display='none';}else{tt.classList.add('pinned');}}

// ============================================================
//  Tab3: 履约板块 — 仓库待收品项 折叠卡片 (v5.11 NEW)
// ============================================================
function renderFulfillment(){
  var fd=data.kpi.fulfillment_data||[]; if(!fd)fd=[];
  var html='<div class="fulfill-grid">';
  fd.forEach(function(wh,i){
    // 今日到货汇总
    var todayBoxes=0, todayPcs=0, todayRecv=0, todayTons=0;
    (wh.today_items||[]).forEach(function(t){
      todayBoxes+=t.boxes; todayPcs+=t.ordered_pcs;
      todayRecv+=t.received_pcs; todayTons+=t.tons;
    });
    var todayPending=todayPcs-todayRecv;

    // 今日到货品项表格行 (v5.16: +skuid, hover采购单号)
    var todayRows='';
    (wh.today_items||[]).forEach(function(t,i2){
      var od=t.order_details||[];
      var odTitle='';
      if(od.length>0){odTitle='采购单: '+od.map(function(o){return o.order_no+' ('+fmt(o.pcs)+'pcs)';}).join(' | ');}
      todayRows+='<tr class="fulfill-row" data-od="'+odTitle.replace(/"/g,'&quot;')+'" ondblclick="pinTooltip(event,this)" onmouseenter="showFulfillTt(event,this)" onmouseleave="hideFulfillTt()"><td>'+t.sku_id+'</td><td>'+t.product+'</td><td>'+fmt(t.boxes)+'</td><td>'+fmt(t.ordered_pcs)+'</td><td>'+fmt(t.received_pcs)+'</td><td>'+(t.tons||0).toFixed(2)+'</td></tr>';
    });

    // 下次到货汇总
    var nextBoxes=0, nextTons=0;
    (wh.next_items||[]).forEach(function(t){nextBoxes+=t.boxes; nextTons+=t.tons;});

    var nextRows='';
    (wh.next_items||[]).forEach(function(t){
      var od=t.order_details||[];
      var odTitle='';
      if(od.length>0){odTitle='采购单: '+od.map(function(o){return o.order_no+' ('+fmt(o.pcs)+'pcs)';}).join(' | ');}
      nextRows+='<tr class="fulfill-row" data-od="'+odTitle.replace(/"/g,'&quot;')+'" ondblclick="pinTooltip(event,this)" onmouseenter="showFulfillTt(event,this)" onmouseleave="hideFulfillTt()"><td>'+t.sku_id+'</td><td>'+t.product+'</td><td>'+fmt(t.boxes)+'</td><td>'+(t.tons||0).toFixed(2)+'</td></tr>';
    });

    html+='<div class="cp-card" id="fulfillCard'+i+'">';
    html+='<div class="cp-card-header" onclick="toggleFulfill('+i+')">';
    html+='<span class="cp-arrow">▶</span>';
    html+='<span class="cp-title">'+wh.warehouse+'</span>';
    html+='<div class="cp-stats">';
    html+='<span class="cp-stat-item">📦 <b>'+wh.today_date+'</b></span>';
    html+='<span class="cp-stat-item">品项 <b>'+(wh.today_items||[]).length+'</b></span>';
    if(wh.next_date)html+='<span class="cp-stat-item">下次 <b>'+wh.next_date+'</b></span>';
    html+='<span class="cp-stat-item" style="color:var(--accent)">吨 <b>'+todayTons.toFixed(2)+'</b></span>';
    html+='</div></div>';

    html+='<div class="cp-card-body">';
    // Today summary row
    if(todayRows){
      html+='<div style="font-weight:600;margin-bottom:4px;color:var(--accent);display:flex;align-items:center;gap:12px;background:var(--bg);padding:6px 10px;border-radius:4px;font-size:11px">';
      html+='📦 '+wh.today_date+' <span style="color:var(--up)">'+fmt(todayBoxes)+'箱</span>';
      html+='<span>'+fmt(todayPcs)+'pcs</span>';
      html+='<span style="color:'+(todayPending>0?'var(--red)':'var(--green)')+'">'+fmt(todayRecv)+'收</span>';
      html+='<span>'+todayTons.toFixed(2)+'吨</span></div>';
      html+='<table class="cp-mini-table"><thead><tr><th>SKUID</th><th>品名</th><th>箱数</th><th>采购pcs</th><th>已收pcs</th><th>吨数</th></tr></thead><tbody>'+todayRows+'</tbody></table>';
    }else{html+='<div style="color:var(--muted);font-size:11px;padding:4px 0">无到货品项</div>';}

    // Next
    if(wh.next_date){
      html+='<div style="font-weight:600;margin:12px 0 4px;color:var(--accent);display:flex;align-items:center;gap:12px;background:var(--bg);padding:6px 10px;border-radius:4px;font-size:11px">';
      html+='📅 '+wh.next_date+' <span style="color:var(--up)">'+fmt(nextBoxes)+'箱</span>';
      html+='<span>'+nextTons.toFixed(2)+'吨</span></div>';
      if(nextRows){
        html+='<table class="cp-mini-table"><thead><tr><th>SKUID</th><th>品名</th><th>箱数</th><th>吨数</th></tr></thead><tbody>'+nextRows+'</tbody></table>';
      }else{html+='<div style="color:var(--muted);font-size:11px;padding:4px 0">无到货品项</div>';}
    }
    html+='</div></div>';
  });

  html+='</div>';
  if(fd.length===0)html='<div style="color:var(--muted);padding:30px;text-align:center;font-size:13px">暂无履约数据</div>';
  document.getElementById('fulfillCards').innerHTML=html;
}

function toggleFulfill(idx){
  var card=document.getElementById('fulfillCard'+idx);
  if(card)card.classList.toggle('open');
}

// ★ v5.16: 履约品项 tooltip — 采购单号+数量
function showFulfillTt(e,el){
  var od=el.getAttribute('data-od')||'';
  if(!od)return;
  var tt=document.getElementById('fulfillTt');
  if(tt.classList.contains('pinned'))return; // 已固定时不跟随hover
  tt.innerHTML=od;
  tt.style.display='block';
  positionTt(e,tt);
}
function hideFulfillTt(){
  var tt=document.getElementById('fulfillTt');
  if(!tt.classList.contains('pinned'))tt.style.display='none';
}
// ★ v5.18: 订货日历在途单号 tooltip
function ocTtShow(e,el){
  var tt=document.getElementById('ocTransitTt');
  if(tt.classList.contains('pinned'))return;
  var html=el.getAttribute('data-oc-tt')||'';
  tt.innerHTML=html.replace(/&quot;/g,'"').replace(/&apos;/g,"'");
  tt.style.display='block';
  positionTt(e,tt);
}
function ocTtHide(){
  var tt=document.getElementById('ocTransitTt');
  if(!tt.classList.contains('pinned'))tt.style.display='none';
}
function ocTtPin(e,el){
  e.stopPropagation();
  var tt=document.getElementById('ocTransitTt');
  if(tt.classList.contains('pinned')){
    tt.classList.remove('pinned');tt.style.display='none';
  }else{
    var html=el.getAttribute('data-oc-tt')||'';
    tt.innerHTML=html.replace(/&quot;/g,'"').replace(/&apos;/g,"'");
    tt.classList.add('pinned');tt.style.display='block';
    positionTt(e,tt);
  }
}
function positionTt(e,tt){
  var x=e.clientX+14,y=e.clientY-10;
  if(x+320>window.innerWidth)x=e.clientX-330;
  if(y+100>window.innerHeight)y=e.clientY-120;
  if(y<10)y=10;
  tt.style.left=x+'px'; tt.style.top=y+'px';
}

// ★ v5.16: 全局双击固定/取消 tooltip
var pinnedEl=null;
function pinTooltip(e,el){
  e.stopPropagation();
  var tt;
  if(el.classList.contains('fulfill-row')){
    tt=document.getElementById('fulfillTt');
    var od=el.getAttribute('data-od');
    if(od)tt.innerHTML=od;
  }else if(el.hasAttribute('data-hm')){
    tt=document.getElementById('hmTooltip');
  }else if(el.classList.contains('tt-row-hover')){
    tt=document.getElementById('todayTt');
  }else if(el.hasAttribute('data-yr')){
    tt=document.getElementById('yrTooltip');
  }
  if(!tt)return;
  // 切换固定
  if(tt.classList.contains('pinned')){
    tt.classList.remove('pinned');
    tt.style.display='none';
    pinnedEl=null;
    return;
  }
  tt.classList.add('pinned');
  pinnedEl=el;
  tt.style.display='block';
  positionTt(e,tt);
}

// ★ v5.16: 固定5品 row 的双击固定
function pinTtRow(e,idx){
  e.stopPropagation();
  keyProdTt(e,idx);
  var tt=document.getElementById('todayTt');
  if(tt.classList.contains('pinned')){
    tt.classList.remove('pinned'); tt.style.display='none';
  }else{tt.classList.add('pinned');}
}

// ★ v5.16: 热力图 cell 的双击固定
function pinHmTooltip(e,el){
  e.stopPropagation();
  hmShow(e,el);
  var tt=document.getElementById('hmTooltip');
  if(tt.classList.contains('pinned')){
    tt.classList.remove('pinned'); tt.style.display='none';
  }else{tt.classList.add('pinned');}
}

// ★ v5.16: 鼠标点击工具提示以外区域取消所有固定 tooltip
document.addEventListener('click',function(e){
  var tts=document.querySelectorAll('.hm-tooltip.pinned,.fulfill-tt.pinned,.yr-tt.pinned,.today-tt.pinned');
  if(tts.length>0){
    var inside=false;
    tts.forEach(function(t){if(t.contains(e.target))inside=true;});
    if(!inside){
      tts.forEach(function(t){t.classList.remove('pinned');t.style.display='none';});
    }
  }
});

loadData();
</script>
